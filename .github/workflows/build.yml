name: Build Windows

on:
  push:
    branches: [master, dev]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build installer
        run: npm run dist -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bible-presenter-windows-installer
          path: release/Bible Presenter Setup *.exe
          retention-days: 30

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bible-presenter-windows-portable
          path: release/win-unpacked/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/Bible Presenter Setup *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
